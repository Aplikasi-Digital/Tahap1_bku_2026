<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal SDN Muara Bakti 01</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0f172a; --bg-glow: #1e293b;
            --btn-blue: linear-gradient(135deg, #3b82f6, #1d4ed8);
            --glass: rgba(255, 255, 255, 0.05);
        }
        body { background: var(--bg-deep); font-family: 'Poppins', sans-serif; color: white; margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .menu-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 15px; margin-bottom: 15px; }
        .category-title { font-weight: bold; color: #fbbf24; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .link-btn { display: flex; align-items: center; gap: 12px; padding: 15px; background: var(--btn-blue); color: white; text-decoration: none; border-radius: 12px; margin-bottom: 10px; font-size: 14px; transition: 0.3s; }
        .link-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 style="margin:0;">PORTAL INTERNAL</h2>
            <h4 style="margin:5px 0; color: #3b82f6;">SDN MUARA BAKTI 01</h4>
            <small style="opacity:0.6;">Kec. Babelan, Kab. Bekasi</small>
        </div>

        <div class="menu-card">
            <div class="category-title"><i class="fa-solid fa-users-gear"></i> DATABASE PEGAWAI</div>
            <a href="#" class="link-btn"><i class="fa-solid fa-file-invoice"></i> Biodata Guru & GTK</a>
            <a href="#" class="link-btn"><i class="fa-solid fa-folder-tree"></i> Arsip SK Berkala / PAK</a>
            <a href="#" class="link-btn"><i class="fa-solid fa-cloud-arrow-up"></i> Upload Berkas Sekolah</a>
        </div>

        <div class="menu-card">
            <div class="category-title"><i class="fa-solid fa-earth-asia"></i> LINK CEPAT</div>
            <a href="https://operator-sekolah.my.id/" class="link-btn" style="background: #334155;"><i class="fa-solid fa-arrow-left"></i> Kembali ke Portal Utama</a>
        </div>

        <div style="text-align:center; font-size:10px; opacity:0.5; margin-top:30px;">
            Sistem Informasi Internal SDN Muara Bakti 01<br>© 2026 Admin Sekolah
        </div>
    </div>
</body>
</html>
