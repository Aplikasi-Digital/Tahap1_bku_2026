<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lampiran Keuangan - Babelan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #1e8449 0%, #2ecc71 100%);
            font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0;
        }
        .box { 
            background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 25px; 
            width: 90%; max-width: 800px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center;
        }
        .btn-back { display: block; margin-bottom: 20px; text-decoration: none; color: #27ae60; font-weight: bold; text-align: left; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; font-size: 13px; }
        th { background: #27ae60; color: white; }
        .btn-view { background: #e74c3c; color: white; padding: 5px 10px; border-radius: 5px; text-decoration: none; font-size: 11px; }
    </style>
</head>
<body>

<div class="box">
    <a href="../index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Kembali ke Portal Utama</a>
    
    <div id="login-area">
        <i class="fa-solid fa-lock" style="font-size: 40px; color: #27ae60;"></i>
        <h2>Akses Lampiran BOSP</h2>
        <input type="password" id="pass" placeholder="Password Keuangan..." style="padding: 12px; border-radius: 10px; border: 1px solid #ddd; width: 250px; text-align: center;">
        <br><br>
        <button onclick="cek()" style="background: #27ae60; color: white; border: none; padding: 10px 30px; border-radius: 10px; cursor: pointer; font-weight: bold;">BUKA DOKUMEN</button>
    </div>

    <div id="daftar-dokumen" style="display:none;">
        <h3 style="color: #27ae60;"><i class="fa-solid fa-file-pdf"></i> Arsip Dokumen Lampiran</h3>
        <table>
            <thead>
                <tr>
                    <th>No</th>
                    <th>Nama Dokumen</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="tabel-isi"></tbody>
        </table>
    </div>
</div>

<script>
    // DAFTAR OTOMATIS: Tambahkan nama file PDF Anda di sini
    const listFile = [
        "BUKU REKENING TK AL-BINA.pdf",
        "BUKU REKENING TK AL-FALIK.pdf",
        "KTP TK AZZAHRO.pdf",
        "TK AL-HIDAYAH.pdf",
        "TK AL-MISHBAH.pdf"
    ];

    function cek() {
        if(document.getElementById('pass').value === "Babelan2026") {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('daftar-dokumen').style.display = 'block';
            
            const tbody = document.getElementById('tabel-isi');
            listFile.sort().forEach((file, i) => {
                tbody.innerHTML += `<tr>
                    <td>${i+1}</td>
                    <td>${file.replace('.pdf', '')}</td>
                    <td><a href="${file}" target="_blank" class="btn-view">LIHAT PDF</a></td>
                </tr>`;
            });
        } else { alert("Password Salah!"); }
    }
</script>
</body>
</html>
