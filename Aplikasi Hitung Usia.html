<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Usia Modern</title>
    <style>
        /* --- CSS: Tampilan --- */
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --text-color: #2d3436;
            --bg-gradient: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h1 {
            color: var(--text-color);
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .input-box {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #555;
        }

        input[type="date"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            color: var(--text-color);
        }

        input[type="date"]:focus {
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: #fff;
            border: none;
            font-size: 18px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #5649c0;
        }

        .result {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            display: none; /* Disembunyikan sampai tombol ditekan */
        }

        .result-box {
            flex: 1;
            margin: 0 5px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            border: 1px solid #eee;
        }

        .result-box span {
            display: block;
            font-size: 24px;
            font-weight: 800;
            color: var(--primary-color);
        }

        .result-box p {
            font-size: 14px;
            color: #636e72;
            margin-top: 5px;
        }

        #error-msg {
            color: #d63031;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }

        /* Responsif untuk layar HP */
        @media (max-width: 400px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 1.5rem;
            }
            .result-box span {
                font-size: 18px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <h1>Kalkulator Usia</h1>
        
        <div class="input-box">
            <label for="date-input">Masukkan Tanggal Lahir:</label>
            <input type="date" id="date-input">
            <p id="error-msg">Silakan pilih tanggal yang valid!</p>
        </div>

        <button onclick="calculateAge()">Hitung Usia</button>

        <div class="result" id="result-display">
            <div class="result-box">
                <span id="years">0</span>
                <p>Tahun</p>
            </div>
            <div class="result-box">
                <span id="months">0</span>
                <p>Bulan</p>
            </div>
            <div class="result-box">
                <span id="days">0</span>
                <p>Hari</p>
            </div>
        </div>
    </div>

    <script>
        /* --- JavaScript: Logika --- */
        function calculateAge() {
            const dateInput = document.getElementById("date-input").value;
            const errorMsg = document.getElementById("error-msg");
            const resultDisplay = document.getElementById("result-display");
            
            // Validasi Input
            if (!dateInput) {
                errorMsg.style.display = "block";
                resultDisplay.style.display = "none";
                return;
            } else {
                errorMsg.style.display = "none";
            }

            const birthDate = new Date(dateInput);
            const today = new Date();

            // Cek jika tanggal lahir di masa depan
            if (birthDate > today) {
                errorMsg.innerText = "Tanggal lahir tidak boleh di masa depan!";
                errorMsg.style.display = "block";
                resultDisplay.style.display = "none";
                return;
            }

            // Variabel untuk menyimpan hasil
            let y = today.getFullYear() - birthDate.getFullYear();
            let m = today.getMonth() - birthDate.getMonth();
            let d = today.getDate() - birthDate.getDate();

            // Logika koreksi jika hari atau bulan negatif
            if (d < 0) {
                m--; 
                // Mengambil jumlah hari di bulan sebelumnya
                const prevMonthDate = new Date(today.getFullYear(), today.getMonth(), 0);
                d += prevMonthDate.getDate();
            }

            if (m < 0) {
                y--;
                m += 12;
            }

            // Tampilkan Hasil
            document.getElementById("years").innerText = y;
            document.getElementById("months").innerText = m;
            document.getElementById("days").innerText = d;
            
            resultDisplay.style.display = "flex";
        }
        
        // Fitur tambahan: Membatasi input tanggal agar max hari ini
        const dateInput = document.getElementById("date-input");
        dateInput.max = new Date().toISOString().split("T")[0];
    </script>
</body>
</html>
