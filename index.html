<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Operator Babelan</title>
    <style>
        :root {
            --primary: #2980b9;
            --dark: #2c3e50;
            --glass: rgba(255, 255, 255, 0.95);
        }

        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }

        .container { 
            background: var(--glass);
            padding: 40px 30px; 
            border-radius: 30px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.1); 
            width: 100%; max-width: 400px; 
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .profile-box {
            width: 130px; height: 130px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            background: #eee;
        }

        .profile-img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        h1 { color: var(--dark); font-size: 22px; margin: 0; letter-spacing: 1px; font-weight: 800; }
        .sub-title { color: var(--primary); font-weight: bold; font-size: 14px; margin-top: 5px; text-transform: uppercase; }

        .link-btn { 
            display: block; padding: 15px; margin: 12px 0;
            border-radius: 15px; text-decoration: none; font-weight: 600;
            color: white; transition: 0.3s; font-size: 14px;
        }

        .btn-blue { background: linear-gradient(to right, #3498db, #2980b9); }
        .btn-orange { background: linear-gradient(to right, #f39c12, #e67e22); }
        .btn-green { background: linear-gradient(to right, #2ecc71, #27ae60); }
        .btn-red { background: linear-gradient(to right, #ff4757, #e74c3c); }

        .link-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .section-name { text-align: left; font-size: 10px; color: #95a5a6; margin-top: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .footer { font-size: 11px; color: #bdc3c7; margin-top: 30px; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-box">
            <img src="profil.jpg" class="profile-img" onload="this.style.opacity=1" onerror="this.src='https://ui-avatars.com/api/?name=Rohiman+Supriyadi&background=2980b9&color=fff&size=128'">
        </div>

        <h1>PORTAL OPERATOR</h1>
        <div class="sub-title">Kecamatan Babelan</div>
        
        <div class="section-name">Manajemen BOSP</div>
        <a href="bku.html" class="link-btn btn-blue">📁 Aplikasi Pendampingan BKU</a>

        <div class="section-name">Monitoring ARKAS</div>
        <a href="https://tinyurl.com/LaporanArkasBabelan" target="_blank" class="link-btn btn-orange">📋 Laporan ARKAS Babelan</a>
        <a href="https://tinyurl.com/ProgresajukanpengesahanARKAS" target="_blank" class="link-btn btn-green">📈 Cek Progres Pengesahan</a>

        <div class="section-name">Layanan Lainnya</div>
        <a href="Aplikasi_SPMB_SDN%20Muara%20Bakti%2001.html" class="link-btn btn-red">📝 Formulir SPMB Online</a>

        <div class="footer">
            &copy; 2026 ROHIMAN SUPRIYADI <br>
            operator-sekolah.my.id
        </div>
    </div>

</body>
</html>
